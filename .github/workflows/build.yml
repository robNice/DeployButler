name: Build Plugin on v* tag (release)

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout tag commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure tag commit is contained in default branch
        shell: bash
        run: |
          set -euo pipefail
          TAG_COMMIT="$(git rev-parse HEAD)"
          DEFAULT_BRANCH="${{ github.event.repository.default_branch }}"
          git fetch origin "$DEFAULT_BRANCH" --prune
          git merge-base --is-ancestor "$TAG_COMMIT" "origin/$DEFAULT_BRANCH"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Build plugin
        run: ./gradlew buildPlugin

      - name: Create GitHub Release and upload asset
        uses: softprops/action-gh-release@v2
        with:
          files: build/distributions/*.zip
          generate_release_notes: true