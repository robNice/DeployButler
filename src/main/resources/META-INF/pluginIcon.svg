<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     width="40" height="40" viewBox="0 0 40 40" fill="none">

    <!-- background -->
    <rect x="1.5" y="1.5" width="37" height="37" rx="8"
          fill="#3B3F46" stroke="#3B82F6" stroke-width="3"/>


    <!-- BUTLER (centered, chunky shapes for readability) -->
    <!-- head -->
    <circle cx="18" cy="17.5" r="6.2" fill="#E6E8EE"/>
    <circle cx="16" cy="16.2" r="1" fill="#1F242B"/>
    <circle cx="20" cy="16.2" r="1" fill="#1F242B"/>

    <ellipse cx="18" cy="20.8" rx="0.9" ry="0.4" fill="#1F242B"/>
    <!-- hair -->
    <path d="M11.8 17.2c.35-4.3 3.7-6.7 6.2-6.7s5.85 2.4 6.2 6.7
           c-1.8-1.3-4.0-2.0-6.2-2.0s-4.4.7-6.2 2.0Z"
          fill="#1F242B"/>

    <!-- suit / torso -->
    <path d="M6.2 35c.9-7.6 6.2-12.6 11.8-12.6S28.9 27.4 29.8 35Z"
          fill="#1F242B" opacity="0.97"/>

    <!-- shirt V -->
    <path d="M18 23.2l-6.2 7.0c1.9 1.6 4.0 2.4 6.2 2.4s4.3-.8 6.2-2.4Z"
          fill="#E6E8EE"/>


    <!-- arms holding tray -->
    <path d="M9.2 28.0c2.0-2.3 4.8-3.6 8.8-3.6" stroke="#1F242B" stroke-width="3.4" stroke-linecap="round"/>

    <path d="M30.8 28.0c-2.0-2.3-4.8-3.6-8.8-3.6" stroke="#1F242B" stroke-width="3.4" stroke-linecap="round"/>

    <!-- bow tie (small, near collar, tight) -->
    <!-- left half: |>< -->
    <path d="M16.4 22.3 H14.6 V24.5 H16.4 L17.6 23.4 Z" fill="#E6E8EE"/>
    <!-- right half: ><| -->
    <path d="M19.6 22.3 H21.4 V24.5 H19.6 L18.4 23.4 Z" fill="#E6E8EE"/>
    <!-- knot -->
    <circle cx="18" cy="23.4" r="0.6" fill="#E6E8EE"/>

    <ellipse cx="31.0" cy="25.3" rx="8.2" ry="2.3" fill="#2A2F37"/>
    <ellipse cx="31.0" cy="24.8" rx="8.2" ry="2.3" fill="#3F4550" opacity="0.85"/>
    <rect x="30.2" y="25.6" width="1.6" height="2.6" rx="0.8" fill="#2A2F37"/>
    <ellipse cx="31.0" cy="28.3" rx="3.0" ry="0.9" fill="#2A2F37"/>

    <path
            d="M30.2 22.6
     L36.5 23.6
     L36.4 26.3
     L29.0 26.3
     L27.6 24.1
     Z"
            fill="#E6E8EE"
    />

    <ellipse cx="35.1" cy="24.8" rx="0.9" ry="0.6" fill="#3B3F46"/>
</svg>