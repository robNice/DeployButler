settings.help.dryRun=Runs the deploy workflow in preview mode only. No Git changes, no branch switch, no merge, no push, and no tag creation are executed.
settings.help.branch=Target branch used for the deploy workflow, typically main or master. The source branch is merged or rebased into this branch.
settings.help.remote=Git remote used for fetch, push, and tag push operations. In most projects this is origin.
settings.help.prefix=Optional prefix added before created version tags. Example: v with version 1.2.3 becomes v1.2.3.
settings.help.rebase=Uses a rebase-oriented workflow instead of a merge-based workflow where supported by the deploy process.
settings.help.confirm=Shows a preview dialog before executing the deploy workflow. Useful as an additional safety confirmation.
settings.help.versionDetector=Preferred strategy for detecting the current project version. Leave empty to use automatic detection.
settings.help.versionCustomPath=Optional custom file path used by version detection, relative to the project root.
settings.help.versionCustomRegex=Regular expression for custom version detection. The first capture group must contain the version value.
settings.help.deployChecks=Manual checks that must be confirmed before deploy continues. Use them for release reminders such as changelog, tests, migrations, or documentation.
