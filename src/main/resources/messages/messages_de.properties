settings.help.dryRun=Führt den Deploy-Workflow nur im Vorschau-Modus aus. Es werden keine Git-Änderungen, kein Branch-Wechsel, kein Merge, kein Push und keine Tag-Erstellung ausgeführt.
settings.help.branch=Ziel-Branch für den Deploy-Workflow, in der Regel main oder master. Der Quell-Branch wird in diesen Branch gemergt oder darauf rebased.
settings.help.remote=Git-Remote für Fetch-, Push- und Tag-Push-Operationen. In den meisten Projekten ist das origin.
settings.help.prefix=Optionales Präfix vor erstellten Versions-Tags. Beispiel: v mit Version 1.2.3 wird zu v1.2.3.
settings.help.rebase=Verwendet, sofern vom Deploy-Prozess unterstützt, einen rebase-orientierten Workflow statt eines merge-basierten Workflows.
settings.help.confirm=Zeigt vor dem Ausführen des Deploy-Workflows einen Vorschau-Dialog an. Nützlich als zusätzliche Sicherheitsbestätigung.
settings.help.versionDetector=Bevorzugte Strategie zur Erkennung der aktuellen Projektversion. Leer lassen, um die automatische Erkennung zu verwenden.
settings.help.versionCustomPath=Optionaler benutzerdefinierter Dateipfad für die Versionserkennung, relativ zum Projektverzeichnis.
settings.help.versionCustomRegex=Regulärer Ausdruck für die benutzerdefinierte Versionserkennung. Die erste Capture-Group muss den Versionswert enthalten.
settings.help.deployChecks=Manuelle Prüfungen, die vor dem Deploy bestätigt werden müssen. Nutze sie für Release-Erinnerungen wie Changelog, Tests, Migrationen oder Dokumentation.
