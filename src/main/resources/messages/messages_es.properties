settings.help.dryRun=Ejecuta el flujo de despliegue solo en modo de vista previa. No se realizan cambios de Git, cambios de rama, merge, push ni creación de etiquetas.
settings.help.branch=Rama de destino utilizada para el flujo de despliegue, normalmente main o master. La rama de origen se fusiona o se rebasa sobre esta rama.
settings.help.remote=Remote de Git utilizado para las operaciones de fetch, push y push de etiquetas. En la mayoría de los proyectos es origin.
settings.help.prefix=Prefijo opcional añadido antes de las etiquetas de versión creadas. Ejemplo: v con la versión 1.2.3 pasa a ser v1.2.3.
settings.help.rebase=Usa, cuando el proceso de despliegue lo permita, un flujo orientado a rebase en lugar de uno basado en merge.
settings.help.confirm=Muestra un diálogo de vista previa antes de ejecutar el flujo de despliegue. Es útil como confirmación de seguridad adicional.
settings.help.versionDetector=Estrategia preferida para detectar la versión actual del proyecto. Déjalo vacío para usar la detección automática.
settings.help.versionCustomPath=Ruta de archivo personalizada opcional para la detección de versión, relativa a la raíz del proyecto.
settings.help.versionCustomRegex=Expresión regular para la detección de versión personalizada. El primer grupo de captura debe contener el valor de la versión.
settings.help.deployChecks=Comprobaciones manuales que deben confirmarse antes de continuar con el despliegue. Úsalas para recordatorios de release como changelog, pruebas, migraciones o documentación.
