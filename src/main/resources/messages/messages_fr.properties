settings.help.dryRun=Exécute le workflow de déploiement en mode aperçu uniquement. Aucun changement Git, aucun changement de branche, aucun merge, aucun push et aucune création de tag ne sont effectués.
settings.help.branch=Branche cible utilisée pour le workflow de déploiement, généralement main ou master. La branche source est fusionnée ou rebasée sur cette branche.
settings.help.remote=Remote Git utilisé pour les opérations de fetch, de push et de push des tags. Dans la plupart des projets, il s’agit de origin.
settings.help.prefix=Préfixe facultatif ajouté avant les tags de version créés. Exemple : v avec la version 1.2.3 devient v1.2.3.
settings.help.rebase=Utilise, lorsque le processus de déploiement le permet, un workflow orienté rebase au lieu d’un workflow basé sur merge.
settings.help.confirm=Affiche une boîte de dialogue d’aperçu avant l’exécution du workflow de déploiement. Utile comme confirmation de sécurité supplémentaire.
settings.help.versionDetector=Stratégie préférée pour détecter la version actuelle du projet. Laissez vide pour utiliser la détection automatique.
settings.help.versionCustomPath=Chemin de fichier personnalisé facultatif utilisé pour la détection de version, relatif à la racine du projet.
settings.help.versionCustomRegex=Expression régulière pour la détection de version personnalisée. Le premier groupe de capture doit contenir la valeur de version.
settings.help.deployChecks=Vérifications manuelles qui doivent être confirmées avant la poursuite du déploiement. Utilisez-les pour des rappels de release comme le changelog, les tests, les migrations ou la documentation.
