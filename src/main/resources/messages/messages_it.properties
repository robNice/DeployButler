settings.help.dryRun=Esegue il workflow di deploy solo in modalità anteprima. Non vengono eseguite modifiche Git, cambi di branch, merge, push o creazione di tag.
settings.help.branch=Branch di destinazione usato per il workflow di deploy, in genere main o master. Il branch di origine viene unito o ribasato su questo branch.
settings.help.remote=Remote Git usato per le operazioni di fetch, push e push dei tag. Nella maggior parte dei progetti è origin.
settings.help.prefix=Prefisso opzionale aggiunto prima dei tag di versione creati. Esempio: v con versione 1.2.3 diventa v1.2.3.
settings.help.rebase=Usa, dove supportato dal processo di deploy, un workflow orientato al rebase invece di uno basato sul merge.
settings.help.confirm=Mostra una finestra di anteprima prima di eseguire il workflow di deploy. Utile come conferma di sicurezza aggiuntiva.
settings.help.versionDetector=Strategia preferita per rilevare la versione corrente del progetto. Lascia vuoto per usare il rilevamento automatico.
settings.help.versionCustomPath=Percorso file personalizzato opzionale usato per il rilevamento della versione, relativo alla radice del progetto.
settings.help.versionCustomRegex=Espressione regolare per il rilevamento personalizzato della versione. Il primo gruppo di cattura deve contenere il valore della versione.
settings.help.deployChecks=Controlli manuali che devono essere confermati prima che il deploy continui. Usali per promemoria di release come changelog, test, migrazioni o documentazione.
