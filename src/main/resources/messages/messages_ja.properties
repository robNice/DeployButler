settings.help.dryRun=デプロイワークフローをプレビューモードでのみ実行します。Git の変更、ブランチ切り替え、マージ、push、タグ作成は実行されません。
settings.help.branch=デプロイワークフローで使用する対象ブランチです。通常は main または master です。ソースブランチはこのブランチへマージまたはリベースされます。
settings.help.remote=fetch、push、タグ push に使用する Git リモートです。多くのプロジェクトでは origin です。
settings.help.prefix=作成されるバージョンタグの前に付ける任意の接頭辞です。例: バージョン 1.2.3 に v を付けると v1.2.3 になります。
settings.help.rebase=デプロイ処理で対応している場合、merge ベースではなく rebase ベースのワークフローを使用します。
settings.help.confirm=デプロイワークフローの実行前にプレビューダイアログを表示します。追加の安全確認として役立ちます。
settings.help.versionDetector=現在のプロジェクトバージョンを検出するための優先戦略です。自動検出を使う場合は空のままにしてください。
settings.help.versionCustomPath=バージョン検出に使用する任意のカスタムファイルパスです。プロジェクトルートからの相対パスで指定します。
settings.help.versionCustomRegex=カスタムバージョン検出用の正規表現です。最初のキャプチャグループにバージョン値が含まれている必要があります。
settings.help.deployChecks=デプロイを続行する前に確認が必要な手動チェックです。変更履歴、テスト、マイグレーション、ドキュメントなどのリリース確認に使用できます。
