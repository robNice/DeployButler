settings.help.dryRun=배포 워크플로를 미리보기 모드에서만 실행합니다. Git 변경, 브랜치 전환, merge, push, 태그 생성은 수행되지 않습니다.
settings.help.branch=배포 워크플로에 사용되는 대상 브랜치로, 일반적으로 main 또는 master입니다. 소스 브랜치는 이 브랜치로 merge 또는 rebase됩니다.
settings.help.remote=fetch, push, 태그 push 작업에 사용되는 Git 리모트입니다. 대부분의 프로젝트에서는 origin입니다.
settings.help.prefix=생성되는 버전 태그 앞에 추가되는 선택적 접두사입니다. 예: 버전 1.2.3에 v를 사용하면 v1.2.3이 됩니다.
settings.help.rebase=배포 프로세스에서 지원되는 경우 merge 기반 대신 rebase 중심 워크플로를 사용합니다.
settings.help.confirm=배포 워크플로를 실행하기 전에 미리보기 대화상자를 표시합니다. 추가 안전 확인으로 유용합니다.
settings.help.versionDetector=현재 프로젝트 버전을 감지하기 위한 선호 전략입니다. 자동 감지를 사용하려면 비워 두세요.
settings.help.versionCustomPath=버전 감지에 사용되는 선택적 사용자 지정 파일 경로로, 프로젝트 루트를 기준으로 한 상대 경로입니다.
settings.help.versionCustomRegex=사용자 지정 버전 감지를 위한 정규식입니다. 첫 번째 캡처 그룹에 버전 값이 포함되어야 합니다.
settings.help.deployChecks=배포를 계속하기 전에 확인해야 하는 수동 체크입니다. 변경 로그, 테스트, 마이그레이션, 문서화 같은 릴리스 알림에 사용할 수 있습니다.
