settings.help.dryRun=Executa o fluxo de implantação apenas em modo de pré-visualização. Nenhuma alteração no Git, troca de branch, merge, push ou criação de tag é executada.
settings.help.branch=Branch de destino usado no fluxo de implantação, normalmente main ou master. O branch de origem é mesclado ou rebased para este branch.
settings.help.remote=Remote Git usado para operações de fetch, push e push de tags. Na maioria dos projetos, é origin.
settings.help.prefix=Prefixo opcional adicionado antes das tags de versão criadas. Exemplo: v com a versão 1.2.3 se torna v1.2.3.
settings.help.rebase=Usa, quando suportado pelo processo de implantação, um fluxo orientado a rebase em vez de um fluxo baseado em merge.
settings.help.confirm=Mostra uma janela de pré-visualização antes de executar o fluxo de implantação. Útil como confirmação adicional de segurança.
settings.help.versionDetector=Estratégia preferida para detectar a versão atual do projeto. Deixe vazio para usar a detecção automática.
settings.help.versionCustomPath=Caminho de arquivo personalizado opcional usado na detecção de versão, relativo à raiz do projeto.
settings.help.versionCustomRegex=Expressão regular para detecção personalizada de versão. O primeiro grupo de captura deve conter o valor da versão.
settings.help.deployChecks=Verificações manuais que devem ser confirmadas antes que a implantação continue. Use-as para lembretes de release como changelog, testes, migrações ou documentação.
