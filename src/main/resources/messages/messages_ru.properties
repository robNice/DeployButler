settings.help.dryRun=Запускает workflow деплоя только в режиме предпросмотра. Изменения Git, переключение ветки, merge, push и создание тега не выполняются.
settings.help.branch=Целевая ветка, используемая для workflow деплоя, обычно main или master. Исходная ветка будет влита или перебазирована в эту ветку.
settings.help.remote=Git remote, используемый для операций fetch, push и push тегов. В большинстве проектов это origin.
settings.help.prefix=Необязательный префикс, добавляемый перед создаваемыми тегами версии. Пример: v с версией 1.2.3 становится v1.2.3.
settings.help.rebase=Использует, если это поддерживается процессом деплоя, workflow на основе rebase вместо workflow на основе merge.
settings.help.confirm=Показывает диалог предпросмотра перед выполнением workflow деплоя. Полезно как дополнительное подтверждение безопасности.
settings.help.versionDetector=Предпочтительная стратегия для определения текущей версии проекта. Оставьте пустым, чтобы использовать автоматическое определение.
settings.help.versionCustomPath=Необязательный пользовательский путь к файлу для определения версии относительно корня проекта.
settings.help.versionCustomRegex=Регулярное выражение для пользовательского определения версии. Первая группа захвата должна содержать значение версии.
settings.help.deployChecks=Ручные проверки, которые должны быть подтверждены перед продолжением деплоя. Используйте их для напоминаний о релизе, таких как changelog, тесты, миграции или документация.
