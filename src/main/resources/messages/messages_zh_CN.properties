settings.help.dryRun=仅以预览模式运行部署工作流。不会执行 Git 更改、分支切换、merge、push 或创建标签。
settings.help.branch=部署工作流使用的目标分支，通常为 main 或 master。源分支会被合并或 rebase 到该分支。
settings.help.remote=用于 fetch、push 和标签 push 操作的 Git 远程仓库。在大多数项目中它是 origin。
settings.help.prefix=在创建的版本标签前添加的可选前缀。示例：版本 1.2.3 加上 v 后会变成 v1.2.3。
settings.help.rebase=在部署流程支持的情况下，使用以 rebase 为主的工作流，而不是基于 merge 的工作流。
settings.help.confirm=在执行部署工作流之前显示预览对话框。可用作额外的安全确认。
settings.help.versionDetector=用于检测当前项目版本的首选策略。留空则使用自动检测。
settings.help.versionCustomPath=用于版本检测的可选自定义文件路径，相对于项目根目录。
settings.help.versionCustomRegex=用于自定义版本检测的正则表达式。第一个捕获组必须包含版本值。
settings.help.deployChecks=部署继续前必须确认的手动检查项。可用于发布提醒，例如更新日志、测试、迁移或文档。
